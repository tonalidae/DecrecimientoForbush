<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>RETO 14 — Presentación</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/theme/black.min.css" id="theme">
<style>
:root{ --accent:#3fa9f5; --accent2:#f5a623; --ink:#eef4ff; --muted:#a9bcdc; --card:#16243f; --line:#2b3f63; }
.reveal{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--ink); font-size:30px;}
.reveal .slides{ text-align:left; }
.reveal h1,.reveal h2,.reveal h3{ color:var(--ink); text-transform:none; letter-spacing:0; font-weight:750; }
.reveal h2{ font-size:1.5em; border-bottom:2px solid var(--line); padding-bottom:.35em; margin-bottom:.7em; }
.reveal h3{ font-size:.85em; color:var(--accent); margin:.1em 0 .35em; }
.reveal .maintitle{ font-size:1.9em; line-height:1.08; margin:.1em 0; }
.reveal .dtitle{ font-size:1.8em; margin:.1em 0; }
.reveal .dlabel{ color:var(--accent); font-weight:800; letter-spacing:.16em; font-size:.6em; margin-bottom:.4em;}
.reveal .dsub{ color:var(--muted); font-size:.7em; }
.reveal .reto{ color:var(--accent); font-weight:800; letter-spacing:.22em; font-size:.6em; }
.reveal .lead{ color:var(--muted); font-size:.72em; line-height:1.45; max-width:24em; }
.reveal .authors{ font-size:.5em; color:var(--ink); margin-top:1em; }
.reveal .datebadge{ display:inline-block; margin-top:1em; color:#bcd; font-size:.55em; border:1px solid var(--line); border-radius:20px; padding:.3em 1em;}
.reveal .navhint{ position:absolute; bottom:-2.5em; left:0; color:var(--muted); font-size:.42em;}
.reveal ul,.reveal ol{ display:block; margin:.2em 0 .2em 1em; }
.reveal li{ margin:.45em 0; line-height:1.35;}
.reveal ul.tight li{ margin:.3em 0; font-size:.92em;}
.reveal .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:1.1em; align-items:center; }
.reveal .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:.7em .9em; }
.reveal .card.accentA{ border-color:var(--accent); }
.reveal .card.accentB{ border-color:var(--accent2); }
.reveal .callout{ color:var(--muted); font-size:.78em; border-left:3px solid var(--accent2); padding-left:.7em; margin-top:.7em;}
.reveal .eq{ text-align:center; background:#101d33; border-radius:12px; padding:.5em; margin:.5em 0; }
.reveal .eq.small{ font-size:.85em; }
.reveal figure{ margin:0; text-align:center; }
.reveal figure img{ max-height:60vh; width:auto; max-width:100%; background:#fff; border-radius:10px; padding:6px; border:1px solid var(--line); box-shadow:0 8px 30px rgba(0,0,0,.35); }
.reveal figcaption{ color:var(--muted); font-size:.5em; margin-top:.5em; line-height:1.3;}
.reveal .facts{ display:grid; grid-template-columns:repeat(3,1fr); gap:1em; margin:1em 0; }
.reveal .fact{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:1em .5em; text-align:center; }
.reveal .fact .num{ display:block; font-size:1.5em; font-weight:800; color:var(--accent);}
.reveal .fact .lbl{ display:block; color:var(--muted); font-size:.5em; margin-top:.6em; line-height:1.3;}
.reveal ol.phases li{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:.5em .8em; margin:.5em 0;}
.reveal table.mini{ border-collapse:collapse; width:100%; font-size:.6em;}
.reveal table.mini th,.reveal table.mini td{ border:1px solid var(--line); padding:.4em .5em; text-align:center;}
.reveal table.mini th{ background:#101d33; color:var(--accent);}
.reveal table.mini td:first-child{ text-align:left; color:var(--muted);}
.reveal code{ background:#101d33; padding:.05em .35em; border-radius:5px; font-size:.85em;}
.reveal .progress{ color:var(--accent); }
.reveal .slide-number{ background:rgba(20,30,50,.7); }
</style>
</head>
<body>
<div class="reveal"><div class="slides">
__BODY__
</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/reveal.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/plugin/math/math.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.1.0/plugin/notes/notes.min.js"></script>
<script>
Reveal.initialize({
  hash:true, slideNumber:'c/t', controls:true, progress:true,
  transition:'slide', backgroundTransition:'fade', center:true,
  width:1280, height:720, margin:0.06, minScale:0.2, maxScale:1.6,
  plugins:[ RevealMath.MathJax3, RevealNotes ],
  math:{ mathjax:'https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js',
         tex:{ inlineMath:[['\\(','\\)']], displayMath:[['$$','$$']] } }
});
</script>
</body>
</html>
